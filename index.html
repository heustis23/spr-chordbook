<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>South Pleasant Revival Chordbook</title>

<style>

body{
font-family: -apple-system, system-ui;
margin:0;
background:#f4f1e8;
color:#111;
}

header{
text-align:center;
padding:20px;
font-size:24px;
font-weight:600;
}

.container{
padding:15px;
}

.song{
padding:12px;
border-bottom:1px solid #ddd;
cursor:pointer;
}

.song:hover{
background:#eee;
}

.artist{
color:#666;
font-size:14px;
}

button{
padding:8px 14px;
border:none;
background:#222;
color:white;
border-radius:6px;
margin:5px;
}

#viewer{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:white;
display:none;
overflow:auto;
padding:30px;
}

#viewer pre{
font-size:22px;
line-height:1.6;
white-space:pre-wrap;
}

.controls{
position:fixed;
top:10px;
right:10px;
}

.playlists{
margin-top:20px;
}

.playlist{
padding:10px;
border-bottom:1px solid #ccc;
}

</style>
</head>

<body>

<header>
South Pleasant Revival  
<br>
<span style="font-size:16px;color:#666">Cover Song Master List</span>
</header>

<div class="container">

<button onclick="addSong()">+ Add Song</button>
<button onclick="exportSongs()">Export Backup</button>
<input type="file" id="importFile" style="display:none" onchange="importSongs(event)">
<button onclick="document.getElementById('importFile').click()">Import</button>

<div id="songList"></div>

</div>

<div id="viewer">

<div class="controls">
<button onclick="closeSong()">Close</button>
<button onclick="transpose(-1)">-</button>
<button onclick="transpose(1)">+</button>
</div>

<h2 id="songTitle"></h2>
<h4 id="songArtist"></h4>

<pre id="songChords"></pre>

</div>

<script>

let songs = JSON.parse(localStorage.getItem("songs") || "[]")

function save(){
localStorage.setItem("songs",JSON.stringify(songs))
}

function render(){

let list = document.getElementById("songList")
list.innerHTML=""

songs.forEach((s,i)=>{

let div = document.createElement("div")
div.className="song"

div.innerHTML=`
<b>${s.title}</b>
<div class="artist">${s.artist}</div>
`

div.onclick=()=>openSong(i)

list.appendChild(div)

})

}

function addSong(){

let title = prompt("Song Title")
let artist = prompt("Artist")
let chords = prompt("Paste chords")

songs.push({
title,
artist,
chords
})

save()
render()

}

function openSong(i){

let s = songs[i]

document.getElementById("songTitle").innerText=s.title
document.getElementById("songArtist").innerText=s.artist
document.getElementById("songChords").innerText=s.chords

document.getElementById("viewer").style.display="block"

}

function closeSong(){
document.getElementById("viewer").style.display="none"
}

function transpose(step){

let pre = document.getElementById("songChords")

pre.innerText = pre.innerText
.replace(/C#/g,"tmp")
.replace(/Db/g,"C#")
.replace(/tmp/g,"Db")

}

function exportSongs(){

let data = JSON.stringify(songs)

let blob = new Blob([data],{type:"application/json"})

let a = document.createElement("a")

a.href=URL.createObjectURL(blob)
a.download="SPR_chordbook_backup.json"
a.click()

}

function importSongs(e){

let file=e.target.files[0]

let reader=new FileReader()

reader.onload=function(){

songs=JSON.parse(reader.result)

save()
render()

}

reader.readAsText(file)

}

render()

</script>

</body>
</html>
